name: Publish Devcontainer Templates

on:
  push:
    branches:
      - master

permissions:
  contents: read
  packages: write

jobs:
  test-and-publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Install Dev Containers CLI
        run: npm install -g @devcontainers/cli

      - name: Log in to GitHub Container Registry (GHCR)
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish All Templates to GHCR
        run: |
          OWNER_LOWER=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')

          for template_dir in src/*/; do
            if [ -d "$template_dir" ]; then
              echo "Publishing template from: $template_dir"
              devcontainer templates publish \
                --registry ghcr.io \
                --namespace "$OWNER_LOWER/devcontainer-templates" \
                "$template_dir"
            fi
          done
